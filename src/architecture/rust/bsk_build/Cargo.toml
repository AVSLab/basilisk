[package]
name    = "bsk-build"
version = "0.1.0"
edition = "2021"
description = "Build and runtime support for native Basilisk Rust modules."

[features]
# The codegen surface (`generate()`, called from build.rs) needs `syn`/
# `walkdir`; the runtime support and procedural attribute remain available
# without this feature. Only the `[build-dependencies]` entry, which calls
# `generate()`, turns code generation on explicitly.
codegen = ["dep:syn", "dep:walkdir"]

# Enable this in a module crate's [dev-dependencies] to make `bskLogger`
# calls (info/warning/bsk_error) print to stderr / panic instead of calling
# Basilisk's C symbols, which aren't linked during `cargo test`.
#
# [dev-dependencies]
# bsk-build = { path = "...", features = ["test_logger"] }
#
# Cargo feature unification ensures the test binary gets this feature while
# production builds do not (dev-dep features are not propagated into the
# crate's public library artifact). After adding this, module code can call
# `self.bskLogger.warning(...)` without `#[cfg(not(test))]` guards.
# `bsk_module!()` must still be gated with `#[cfg(not(test))]` because the
# generated shim references Basilisk's message-port C symbols.
test_logger = []

[dependencies]
bsk-macros = { path = "../bsk_macros" }
# syn: proper Rust AST parser (same technology cbindgen uses internally).
# Used to find the *Config struct in a module's configured Rust source path,
# read its fields and doc-comments, and produce the C header + shim.
syn  = { version = "2", features = ["full", "extra-traits"], optional = true }
# walkdir: portable recursive directory scan to find *.rs source files.
walkdir = { version = "2", optional = true }
