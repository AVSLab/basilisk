[package]
name = "bsk-messages"
version = "0.1.0"
edition = "2021"
rust-version.workspace = true
description = "Auto-generated Rust FFI bindings for Basilisk C message types"
license = "ISC"

# build.rs generates the message bindings into Cargo's OUT_DIR from Basilisk's
# generated cMsgCInterface headers. CMake supplies those headers whenever Rust
# module support is enabled, so message contributors do not maintain a second
# committed interface.

[dependencies]
# BskModuleRuntime/Msg/MsgReader/MsgWriter/BskModule/BskLoggerRef are
# hand-written, not generated. This crate re-exports them from bsk-build.
bsk-build = { path = "../bsk_build" }

[build-dependencies]
bindgen = { version = "0.72.1", default-features = false, features = ["prettyplease", "runtime"] }
prettyplease = "0.2.37"
proc-macro2 = "1.0.107"
regex = "1.12.3"
syn = { version = "2.0.119", features = ["full"] }
