repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.3.0
    hooks:
      -   id: trailing-whitespace
      -   id: end-of-file-fixer
      -   id: check-yaml
      -   id: check-added-large-files
          args: ['--maxkb=10000']
      -   id: check-case-conflict
      -   id: check-merge-conflict
      -   id: debug-statements
-   repo: local
    hooks:
      -   id: check-supportdata-registry
          name: Ensure supportData registrySnippet.py is updated
          entry: python src/utilities/supportDataTools/checkSync.py
          language: python
          files: ^supportData/
          pass_filenames: false
      -   id: check-commit-message-prefix
          name: Ensure commit message starts with [#xxxx]
          entry: python src/utilities/preCommitTools/checkCommitMessage.py
          language: python
          stages: [commit-msg]
