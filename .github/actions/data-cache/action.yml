name: Cache bsk support data
description: Restore and save the Pooch cache for Basilisk support data files

runs:
  using: composite
  steps:
    - name: Set BSK_SUPPORT_DATA_CACHE
      shell: bash
      run: echo "BSK_SUPPORT_DATA_CACHE=${{ github.workspace }}/.bsk-cache" >> $GITHUB_ENV
    - name: Get bi-weekly cache period
      id: date
      shell: bash
      run: echo "period=$(date +'%Y')-$(( 10#$(date +'%W') / 2 ))" >> $GITHUB_OUTPUT
    - name: Cache bsk support data
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/.bsk-cache
        key: bsk-support-data-${{ runner.os }}-${{ steps.date.outputs.period }}-${{ hashFiles('src/utilities/supportDataTools/dataFetcher.py') }}
        restore-keys: |
          bsk-support-data-${{ runner.os }}-
