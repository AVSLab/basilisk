name: Nightly Wheels

on:
  schedule:
    - cron: "0 6 * * *" # Every day at 6:00 UTC
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: # keep these platforms in sync with the pull-request.yml file
          - macos-26
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - windows-2025-vs2026
        include:
          - os: windows-2025-vs2026
            extra-conan-args: --generator Ninja

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}

      - name: Setup system dependencies
        uses: ./.github/actions/setup

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.1.4
        env:
          CONAN_ARGS: "--opNav True --mujoco True ${{ matrix.extra-conan-args }}"
          CIBW_TEST_SKIP: "*"

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: nightly-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  notify-failure:
    name: Notify Slack on Failure
    needs: build-wheels
    if: ${{ always() && needs.build-wheels.result == 'failure' }}
    runs-on: ubuntu-24.04
    permissions: {}

    steps:
      - name: Post failure to bsk_general
        env:
          HEAD_BRANCH: ${{ github.ref_name }}
          HEAD_SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_WEBHOOK_URL: ${{ secrets.BSK_GENERAL_SLACK_WEBHOOK_URL }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          webhook_url = os.environ["SLACK_WEBHOOK_URL"].strip()
          if not webhook_url:
              print("::error::Missing BSK_GENERAL_SLACK_WEBHOOK_URL repository secret")
              sys.exit(1)

          run_url = os.environ["RUN_URL"]
          run_number = os.environ["RUN_NUMBER"]
          short_sha = os.environ["HEAD_SHA"][:7]
          text = (
              f":warning: {os.environ['WORKFLOW_NAME']} failed "
              f"for `{os.environ['HEAD_BRANCH']}` at `{short_sha}`. "
              f"<{run_url}|View run #{run_number}>"
          )

          timeout = 30  # [s]
          request = urllib.request.Request(
              webhook_url,
              data=json.dumps({"text": text}).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=timeout) as response:
              print(f"Slack notification response: {response.status}")
          PY

  publish-index:
    name: Publish Nightly Index
    needs: build-wheels
    if: ${{ github.ref_name == 'develop' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout scripts
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          sparse-checkout: .github/scripts

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: nightly-wheels-*
          merge-multiple: true
          path: wheels

      - name: Generate simple index
        run: python .github/scripts/generate_nightly_index.py --wheels-dir wheels --output-dir nightly

      - name: Deploy nightly index to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./nightly
          destination_dir: nightly
          keep_files: false

      - name: Checkout gh-pages branch
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          fetch-depth: 0
          path: gh-pages-site

      - name: Trim gh-pages history
        shell: bash
        working-directory: gh-pages-site
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          archive_path="${RUNNER_TEMP}/gh-pages-site.tar"
          tar --exclude=.git -cf "${archive_path}" .

          git checkout --orphan gh-pages-reset
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          tar -xf "${archive_path}"

          git add -A
          git commit -m "Trim gh-pages history"
          git branch -M gh-pages
          git push --force origin gh-pages
