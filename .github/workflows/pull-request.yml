name: "Pull Request"

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # One full job per platform publishes Conan dependencies. Other jobs restore only.
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/pre-commit

  build-linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    needs: pre-commit
    name: Linux (MAX Python)
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/data-cache
      # Rust module support is experimental and gated behind --rustModules
      #  ubuntu-24.04 GitHub-hosted runners ship cargo/rustc
      # preinstalled (see actions/runner-images' Ubuntu 24.04 software list).
      - uses: ./.github/actions/build
        with:
          python-version: 3.14
          conan-args: --opNav True --mujoco True --rustModules True
          save-conan-cache: true
      - name: Test Rust workspace
        run: cargo test --workspace --all-features --locked --manifest-path src/Cargo.toml
      - name: Check committed Rust bindings are up to date
        run: |
          sudo apt-get update && sudo apt-get install -y libclang-dev
          cargo install bindgen-cli --locked
          python3 src/architecture/rust/gen_rust_messages.py
          python3 src/architecture/rust/gen_rust_utilities.py
          if ! git diff --exit-code -- src/architecture/rust/bsk_messages/src/lib.rs src/architecture/rust/bsk_utilities/src/raw.rs; then
            echo "::error::src/architecture/rust/bsk_messages/src/lib.rs and/or src/architecture/rust/bsk_utilities/src/raw.rs are stale (don't match what the generators under src/architecture/rust produce from the message/utility headers in this PR). Regenerate them locally and commit the result."
            exit 1
          fi
      - name: Pytest
        working-directory: src
        run: |
          pip install pytest-error-for-skips pytest-timeout
          pytest -n auto -m "not ciSkip" -rs --error-for-skips --timeout=300 --timeout-method=thread --durations=25 -v
      - name: CTest
        if: ${{ always() && hashFiles('dist3/CTestTestfile.cmake') != '' }}
        working-directory: dist3
        run: ctest --output-on-failure

  build-windows:
    runs-on: windows-2025-vs2026
    timeout-minutes: 105
    needs: pre-commit
    name: Windows (MAX Python)
    env:
      MPLBACKEND: agg
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/data-cache
      - uses: ./.github/actions/build
        with:
          python-version: 3.14
          conan-args: --opNav True --mujoco True --generator Ninja
          save-conan-cache: true
      - name: Pytest
        shell: pwsh
        working-directory: src
        run: |
          pip install pytest-error-for-skips pytest-timeout
          pytest -n auto -m "not ciSkip" -rs --error-for-skips --timeout=300 --timeout-method=thread --durations=25 -v
          if(($LastExitCode -ne 0) -and ($LastExitCode -ne 5)) {exit 1}
      - name: CTest
        if: ${{ always() && hashFiles('dist3/CTestTestfile.cmake') != '' }}
        shell: pwsh
        working-directory: dist3
        run: |
          ctest --output-on-failure
          if(($LastExitCode -ne 0) -and ($LastExitCode -ne 5)) { exit 1 }

  build-macos:
    runs-on: macos-26
    timeout-minutes: 90
    needs: pre-commit
    strategy:
      fail-fast: false
      matrix:
        job_suffix: [""]
        python_label: ["MIN Python"]
        python: ["3.9"]
        pytest_flags:
          [
            '-n auto -m "not ciSkip" -rs --error-for-skips --timeout=300 --timeout-method=thread --durations=25 -v',
          ]
        conan_args: ["--opNav True --mujoco True"]
        include:
          # An extra Basilisk build to test building without visualization enabled
          - python: "3.14"
            python_label: "MAX Python"
            pytest_flags: -n auto -m "not ciSkip" -rs --timeout=300 --timeout-method=thread --durations=25 -v
            conan_args: --opNav True --mujoco True --vizInterface False
            job_suffix: "--vizInterface False"

    name: macOS (${{ matrix.python_label }}) ${{ matrix.job_suffix }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/data-cache
      - uses: ./.github/actions/build
        with:
          python-version: ${{ matrix.python }}
          conan-args: ${{ matrix.conan_args }}
      - name: Pytest
        working-directory: src
        run: |
          pip install pytest-error-for-skips pytest-timeout
          pytest ${{ matrix.pytest_flags }}
      - name: CTest
        if: ${{ always() && hashFiles('dist3/CTestTestfile.cmake') != '' }}
        working-directory: dist3
        run: ctest -C Release --output-on-failure

  docs:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/data-cache
      - name: Build Basilisk
        uses: ./.github/actions/build
        with:
          python-version: 3.14
          conan-args: --opNav True --allOptPkg --mujoco True
          save-conan-cache: true
      - name: Build docs
        uses: ./.github/actions/docs
